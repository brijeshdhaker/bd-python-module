#

# Use postgres/example user/password credentials
# psql -h postgres.sandbox.net -U $POSTGRES_USER -d $POSTGRES_DB
# psql -h postgres.sandbox.net -U $POSTGRES_USER -d $POSTGRES_DB -W $POSTGRES_ADMIN_PASSWORD
# CREATE EXTENSION vector;
# SELECT * FROM pg_extension;
# CREATE TABLE items (id bigserial PRIMARY KEY, embedding vector(3));
# INSERT INTO items (embedding) VALUES ('[1,2,3]'), ('[4,5,6]');
# SELECT * FROM items ORDER BY embedding <-> '[3,1,2]' LIMIT 5;
#

# include:
#  - path: ./docker-minio.yml
#  - path: ./docker-mysqlserver.yml
#  - path: ./docker-postgres.yml

#
services:

  #
  minio:
    image: minio/minio:RELEASE.2024-07-29T22-14-52Z
    hostname: minio.sandbox.net
    container_name: minio
    healthcheck:
      test: echo minio.sandbox.net || exit 1
      retries: 20
      interval: 10s
    networks:
      default:
        aliases:
          - warehouse-hadoop.minio
          - warehouse-flink.minio
          - warehouse-rest.minio
          - warehouse-data.minio
          - warehouse-demo.minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - MINIO_DOMAIN=minio
      - MINIO_ADDRESS=0.0.0.0:9010
      - MINIO_CONSOLE_ADDRESS=0.0.0.0:9011
      # - MINIO_ACCESS_KEY_FILE=/apps/security/keys/minio_access_key
      # - MINIO_SECRET_KEY_FILE=/apps/security/keys/minio_secret_key
      # - MINIO_ROOT_USER_FILE=/apps/security/keys/minio_root_user
      # - MINIO_ROOT_PASSWORD_FILE=/apps/security/keys/minio_root_password
    ports:
      - "9010:9010"
      - "9011:9011"
    command: ["server", "/data", "--console-address", ":9011"]
    volumes:
      - sandbox_apps_path:/apps
      - sandbox_minio_data:/data
    extra_hosts:
      - "docker.sandbox.net:172.18.0.1"

  devcontainer:
    image: mcr.microsoft.com/devcontainers/miniconda:1-3
    build:
      context: .
      dockerfile: Dockerfile.dev
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity
    volumes:
      - .:/workspace/bd-notebooks-module:cached
      - ${HOME}/.m2:/home/vscode/.m2
      - ${HOME}/.ivy2:/home/vscode/.ivy2
      - sandbox_apps_path:/apps
    depends_on:
      - minio
    extra_hosts:
      - docker.sandbox.net:172.18.0.1
    # Runs app on the same network as the database container, allows "forwardPorts" in devcontainer.json function.
    network_mode: "sandbox.net"
    # [Optional] Required for ptrace-based debuggers like C++, Go, and Rust
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

  #
  # Mysql Server
  #
  mysqlserver:
    image: mysql:8.0.33
    container_name: mysqlserver
    hostname: mysqlserver.sandbox.net
    restart: always
    ports:
      - "3306:3306"
    command: "mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci"
    volumes:
      - sandbox_apps_path:/apps
      - sandbox_mysql_data:/var/lib/mysql
      - ./conf/mysql:/etc/mysql/conf.d
      - ./conf/mysql/init-setup.sh:/docker-entrypoint-initdb.d/init-setup.sh
    secrets:
      - mysql-root-password
    env_file:
      - ./conf/mysql/envvars
    healthcheck:
      test: "/usr/bin/mysql --user=root --password=$$MYSQL_ADMIN_PASSWORD --execute \"SHOW DATABASES;\""
      # test: ["CMD", 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p$$MYSQL_ADMIN_PASSWORD']
      timeout: 20s
      retries: 10
      interval: 10s
    extra_hosts:
      - "docker.sandbox.net:172.18.0.1"
      
  #
  # Postgres Server
  #
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgresql
    hostname: postgresql.sandbox.net
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    ports:
      - "5432:5432"    
    volumes:
#      - sandbox_apps_path:/apps
      - /apps/sandbox/postgres/data:/var/lib/postgresql/data
      - ./conf/postgres/postgres.conf:/etc/postgresql/postgresql.conf
      #- ./conf/postgres/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 134217728 # 128*2^20 bytes = 128Mb
    secrets:
      - postgres-passwd    
    env_file:
      - ./conf/postgres/envvars

  # adminer:
  #   image: adminer
  #   restart: always
  #   ports:
  #     - 8080:8080
  
#
#
secrets:
  mysql-root-password:
    file: ./conf/mysql/password.txt
  postgres-passwd:
    file: ./conf/postgres/password.txt
#
models:
  llama:
    model: ai/llama3.2:1B-Q8_0
    context_size: 2048
  embedding-model:
    model: ai/all-minilm-l6-v2-vllm
#
# Docker Volumes
#
volumes:
  #
  sandbox_apps_path:
    external: true
  #  
  sandbox_security_secrets:
    external: true
  #  
  sandbox_mysql_data:
    external: true
  #  
  sandbox_minio_data:
    external: true
#
# Docker Networks
#
networks:
  default:
    external: true
    driver: bridge
    name: sandbox.net
