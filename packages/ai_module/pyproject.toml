[build-system]
requires = ["uv_build>=0.11.21,<0.12"]
build-backend = "uv_build"

[project]
name = "ai_module"
description = "ai_module"
version = "0.1.0"
readme = "README.md"

dependencies = [
    "core_module",
    "composio<=0.17.1",
    "chainlit>=2.11.1",
    "chromadb>=1.1.1",
    "crewai-tools[mcp]>=1.14.3",
    "crewai[file-processing,litellm,tools]==1.14.3",
    "crewai[tools]",
    "docx2txt>=0.9",
    "faiss-cpu>=1.13.2",
    "fastapi[standard]>=0.136.1",
    "jq>=1.11.0",
    "langchain>=1.2.17",
    "langchain-chroma>=1.0.0",
    "langchain-community>=0.4.1",
    "langchain-groq>=1.1.2",
    "langchain-huggingface>=1.2.2",
    "langchain-mcp-adapters>=0.2.2",
    "langchain-ollama>=1.1.0",
    "langchain-openai>=1.2.1",
    "langchain-tavily>=0.2.18",
    "langchainhub>=0.1.21",
    "langgraph>=1.1.10",
    "langgraph-checkpoint-postgres>=3.1.0",
    "langsmith>=0.8.3",
    "openai-agents>=0.4.2",
    "pdfplumber>=0.11.9",
    "psycopg[binary]>=3.3.4",
    #"pydantic[email]>=2.12.5",
    "pygithub>=2.9.1",
    "pymupdf>=1.26.7",
    "pypdf>=6.10.2",
    "sentence-transformers>=5.4.1",
    "sqlalchemy>=2.0.49",
    "streamlit>=1.57.0",
    "tavily-python>=0.7.24",
    "torchvision>=0.26.0",
]


[tool.uv.sources]
core_module = { workspace = true }

[tool.pytest.ini_options]
#addopts = "--maxfail=1"
addopts = "--no-header"
cache_dir = ".venv/pytest-cache"
filterwarnings = ["ignore::DeprecationWarning"]
markers = [
    "anomaly: marks tests as anomaly detection tests",
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]
pythonpath = [
    "src"
]