[build-system]
requires = ["uv_build>=0.11.21,<0.12"]
build-backend = "uv_build"

[project]
name = "core-module"
description = "core-module"
version = "0.1.0"
readme = "README.md"

dependencies = [
    "confluent-kafka[avro]>=2.14.0",
    "kafka-python>=2.3.1",
    "kafka-python-ng>=2.2.3",
    "mysql-connector-python>=9.7.0",
    "pymysql>=1.1.3",
    "google-api-python-client>=2.196.0",
    "google-auth-httplib2>=0.4.0",
    "google-auth-oauthlib>=1.4.0",
    "psycopg[binary]>=3.3.4",
    "pymysql>=1.1.3",
    "python-dotenv>=1.2.2",
    "sqlalchemy>=2.0.49",
    "ipython-sql>=0.5.0",
    "ipywidgets>=8.1.8",
    "jupysql>=0.11.1",
    "ipykernel>=7.2.0",
]


[tool.uv.sources]