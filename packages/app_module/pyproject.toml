[build-system]
requires = ["uv-build"]
build-backend = "uv_build"

[project]
name = "app-module"
version = "0.1.0"
readme = "README.md"

dependencies = [
    "core-module", # Declare dependency on the peer module
    "api-module"
]

[tool.uv.sources]
core-module = { workspace = true } # Tells uv to look inside the workspace
api-module = { workspace = true }


[tool.pytest.ini_options]
#addopts = "--maxfail=1"
addopts = "--no-header"
cache_dir = ".venv/pytest-cache"
filterwarnings = ["ignore::DeprecationWarning"]
markers = [
    "anomaly: marks tests as anomaly detection tests",
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]
pythonpath = [
    "src"
]