[build-system]
requires = ["uv_build>=0.11.21,<0.12"]
build-backend = "uv_build"

[project]
name = "dqx-module"
description = "dqx-module"
version = "0.1.0"
readme = "README.md"

dependencies = [
    "dbx_module",
    "databricks-labs-dqx"
]


[tool.uv.sources]
dbx_module = { workspace = true }


[tool.pytest.ini_options]
#addopts = "--maxfail=1"
addopts = "--no-header"
cache_dir = ".venv/pytest-cache"
filterwarnings = ["ignore::DeprecationWarning"]
markers = [
    "anomaly: marks tests as anomaly detection tests",
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]
pythonpath = [
    "src"
]