# The main pipeline for bd-databricks-module

resources:
  pipelines:
    lakeflow_pipeline_dqx_qc:
      name: lakeflow_pipeline_dqx_qc
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../../packages/dbx_module/src/dbx_module"

      libraries:
        - glob:
            include: ../../packages/dbx_module/src/dbx_module/etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
